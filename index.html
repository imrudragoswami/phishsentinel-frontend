<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishSentinel AI</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: #1e293b; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); width: 100%; max-width: 500px; text-align: center; }
        input { width: 80%; padding: 12px; border-radius: 6px; border: none; margin-bottom: 1rem; }
        button { padding: 12px 24px; border-radius: 6px; border: none; background: #3b82f6; color: white; cursor: pointer; font-weight: bold; }
        #result { margin-top: 1.5rem; padding: 1rem; border-radius: 8px; display: none; }
        .safe { background: #064e3b; color: #6ee7b7; }
        .suspicious { background: #78350f; color: #fcd34d; }
        .phishing { background: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🛡️ PhishSentinel AI</h1>
        <p>Advanced Cyber Security Scanner</p>
        <input type="text" id="urlInput" placeholder="Enter URL to scan (e.g., https://sbi.co.in)">
        <button onclick="scanURL()">Scan Website</button>
        <div id="result"></div>
    </div>

    <script>
        async function scanURL() {
            const url = document.getElementById('urlInput').value;
            const resultDiv = document.getElementById('result');
            if(!url) return alert("Please enter a URL");

            resultDiv.style.display = "block";
            resultDiv.innerHTML = "Scanning...";
            resultDiv.className = "";

            try {
                // UPDATE THIS LINK TO YOUR RENDER URL
                const API_URL = "https://phishsentinel-api.onrender.com/api/scan?url=";
                const response = await fetch(API_URL);
                const data = await response.json();

                resultDiv.className = data.status.toLowerCase();
                resultDiv.innerHTML = `
                    <h3>${data.status} (${data.confidence}%)</h3>
                    <p><strong>Analysis:</strong> ${data.reason}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = "Error connecting to backend.";
            }
        }
    </script>
</body>
</html>
